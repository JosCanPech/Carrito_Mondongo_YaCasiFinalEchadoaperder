<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - FunkoHunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="estilos.css">
    <style>
        body { background: #f8f8f8; font-family: 'Inter', sans-serif; }

        .admin-container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .admin-header {
            background: #fff;
            padding: 20px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .admin-header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: #1a1a1a;
        }
        .admin-header .admin-badge {
            background: #1a1a1a;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: 600;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 4px solid #1a1a1a;
        }
        .stat-card .stat-label { color: #666; font-size: 0.85rem; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
        .stat-card.green { border-left-color: #2ecc71; }
        .stat-card.orange { border-left-color: #f39c12; }
        .stat-card.red { border-left-color: #e74c3c; }
        .stat-card.blue { border-left-color: #3498db; }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #fff;
            padding: 8px;
            border-radius: 12px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #666;
            transition: all 0.15s;
        }
        .tab-btn:hover { background: #f0f0f0; }
        .tab-btn.active { background: #1a1a1a; color: #fff; }

        .tab-content {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            min-height: 400px;
        }

        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        table.admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.92rem;
        }
        .admin-table th {
            background: #fafafa;
            font-weight: 600;
            color: #555;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .admin-table tr:hover { background: #fafafa; }

        .img-thumb {
            width: 44px; height: 44px; border-radius: 6px;
            object-fit: cover; background: #f0f0f0;
        }

        .pill {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 600;
        }
        .pill-green { background: #d4edda; color: #155724; }
        .pill-orange { background: #fff3cd; color: #856404; }
        .pill-red { background: #f8d7da; color: #721c24; }
        .pill-gray { background: #e9ecef; color: #495057; }

        .btn-admin {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-edit { background: #f0f0f0; color: #333; }
        .btn-edit:hover { background: #e0e0e0; }
        .btn-delete { background: #fee; color: #c0392b; }
        .btn-delete:hover { background: #fcc; }
        .btn-primary {
            background: #1a1a1a; color: #fff;
            padding: 10px 18px; border-radius: 8px;
            border: none; cursor: pointer; font-weight: 600;
        }
        .btn-primary:hover { background: #333; }
        .btn-secondary {
            background: #fff; color: #1a1a1a;
            padding: 8px 14px; border-radius: 6px;
            border: 1px solid #ddd; cursor: pointer;
        }

        .filter-group {
            display: flex; gap: 8px; align-items: center;
        }
        .filter-group select, .filter-group input {
            padding: 8px 12px; border-radius: 6px;
            border: 1px solid #ddd; font-size: 0.9rem;
        }

        /* Modal de edición/creación */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { margin-top: 0; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 500; font-size: 0.9rem; color: #333;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 6px;
            font-family: inherit; font-size: 0.95rem;
            box-sizing: border-box;
        }
        .form-group textarea { min-height: 70px; resize: vertical; }
        .modal-actions {
            display: flex; gap: 8px; justify-content: flex-end;
            margin-top: 18px;
        }

        .empty-state {
            text-align: center; padding: 60px 20px; color: #999;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; }

        /* Detalle de compra (acordeón) */
        .compra-row.expandable { cursor: pointer; }
        .compra-detail-row {
            display: none;
            background: #fafafa;
        }
        .compra-detail-row.open { display: table-row; }
        .compra-detail-content {
            padding: 16px;
        }
        .compra-detail-content ul {
            margin: 8px 0 0; padding-left: 20px;
        }

        /* --- NUEVOS ESTILOS PARA LA ZONA DE SUBIDA DE IMAGEN --- */
        .upload-form {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #fdfdfd;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px dashed #ccc;
            margin-bottom: 8px;
        }
        .file-input {
            flex: 1;
            font-size: 0.85rem;
            color: #555;
            border: none !important;
            padding: 0 !important;
            background: transparent;
        }
        .file-input::file-selector-button {
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 6px;
            color: #333;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
        }
        .file-input::file-selector-button:hover {
            background: #f0f0f0;
        }
        .btn-upload {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

   <!--  <h1>Mi Imagen desde S3</h1>-->
   <!--  <img id="miImagen" src="" alt="Cargando..." style="max-width: 300px;">-->

    <div class="admin-container">

        <!-- HEADER -->
        <div class="admin-header">
            <h1>
                <i class="bi bi-shield-lock"></i>
                Panel de administración
                <span class="admin-badge">ADMIN</span>
            </h1>
            <div class="admin-actions">
                <span id="admin-name" style="color:#666; font-size:0.9rem;"></span>
                <a href="Client.html" class="btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver al sitio
                </a>
            </div>
        </div>

        <!-- DASHBOARD STATS -->
        <div class="stats-grid" id="stats-grid">
            <!-- Las tarjetas se rellenan con JS -->
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('productos')" id="tab-productos-btn">
                <i class="bi bi-box-seam"></i> Productos
            </button>
            <button class="tab-btn" onclick="cambiarTab('compras')" id="tab-compras-btn">
                <i class="bi bi-receipt"></i> Compras
            </button>
        </div>

        <!-- TAB PRODUCTOS -->
        <div class="tab-content" id="tab-productos">
            <div class="table-toolbar">
                <h2 style="margin:0; font-size:1.1rem;">Catálogo de Funkos</h2>
                <button class="btn-primary" onclick="abrirModalProducto()">
                    <i class="bi bi-plus-lg"></i> Nuevo producto
                </button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Título</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="productos-tbody">
                    <tr><td colspan="6" class="empty-state">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- TAB COMPRAS -->
        <div class="tab-content" id="tab-compras" style="display:none;">
            <div class="table-toolbar">
                <h2 style="margin:0; font-size:1.1rem;">Historial de compras</h2>
                <div class="filter-group">
                    <label for="filtro-status" style="font-size:0.85rem;">Estado:</label>
                    <select id="filtro-status" onchange="cargarCompras()">
                        <option value="">Todos</option>
                        <option value="Completado">Completado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Fallido">Fallido</option>
                    </select>
                </div>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Compra</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="compras-tbody">
                    <tr><td colspan="6" class="empty-state">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- MODAL CREAR/EDITAR PRODUCTO -->
    <div class="modal-backdrop" id="modal-producto">
        <div class="modal">
            <h2 id="modal-titulo">Nuevo producto</h2>
            <input type="hidden" id="prod-id">

            <div class="form-group">
                <label>Título</label>
                <input type="text" id="prod-titulo" placeholder="Ej. Funko Pop Darth Vader">
            </div>
            <div class="form-group">
                <label>Precio (MXN)</label>
                <input type="number" id="prod-precio" step="0.01" min="0" placeholder="350.00">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="prod-cantidad" min="0" placeholder="10">
            </div>
            
            <!-- CONTENEDOR DE IMAGEN CORREGIDO -->
            <div class="form-group">
                <label>Imagen del producto</label>
                
                <!-- 1. Formulario independiente para subir al servidor -->
            <div class="upload-form">
                <input type="file" name="file" id="file" class="file-input">
            </div>

                <!-- 2. Input de texto original que usa el JS para guardar en la BD -->
                <input type="text" id="prod-imagen" placeholder="Nombre de la imagen (Ej. Darth_Vader.png)" readonly>
            </div>
            
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="prod-descripcion" placeholder="Descripción opcional..."></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="cerrarModalProducto()">Cancelar</button>
                <button class="btn-primary" onclick="guardarProducto()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
